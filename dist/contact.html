<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — SlabWebPy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-white text-gray-900 antialiased">

    <nav class="bg-white shadow-md sticky top-0 z-50">
      <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
        <span class="text-gray-800 text-xl font-bold tracking-tight">SlabWebPy</span>
        <div class="flex gap-6"><a href="index.html" class="text-gray-800 hover:opacity-70 font-medium transition">Home</a><a href="contact.html" class="text-gray-800 hover:opacity-70 font-medium transition">Contact</a><a href="docs.html" class="text-gray-800 hover:opacity-70 font-medium transition">Docs</a></div>
      </div>
    </nav>
    

    <section class="bg-indigo-600 py-24 px-6 text-center">
      <div class="max-w-3xl mx-auto space-y-6">
        <h1 class="text-white text-5xl font-extrabold tracking-tight leading-tight">Get in Touch</h1>
        <p class="text-white/80 text-xl">We'd love to hear from you</p>
        
      </div>
    </section>
    
<section class="bg-white py-16 px-6"><div class="max-w-2xl mx-auto"><form action="#" method="post" novalidate><div class="mb-6"><h2 class="text-gray-900 text-2xl font-bold mb-1">Send us a message</h2><p class="text-gray-500 text-sm mb-6">Fill out the form and we'll get back to you soon.</p></div><div class="grid grid-cols-2 gap-x-6 gap-y-5"><div class="col-span-1"><label for="name" class="text-gray-700 text-sm font-medium block mb-1">Full Name <span class="text-red-500">*</span></label><input type="text" id="name" name="name" placeholder="John Doe" value="" required class="w-full border rounded-lg px-4 py-2.5 text-sm transition bg-white border-gray-200 text-gray-900 focus:ring-2 focus:ring-indigo-400 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed" /></div><div class="col-span-1"><label for="email" class="text-gray-700 text-sm font-medium block mb-1">Email <span class="text-red-500">*</span></label><input type="email" id="email" name="email" placeholder="john@example.com" value="" required class="w-full border rounded-lg px-4 py-2.5 text-sm transition bg-white border-gray-200 text-gray-900 focus:ring-2 focus:ring-indigo-400 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed" /></div><div class="col-span-1"><label for="phone" class="text-gray-700 text-sm font-medium block mb-1">Phone</label><input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" value=""  class="w-full border rounded-lg px-4 py-2.5 text-sm transition bg-white border-gray-200 text-gray-900 focus:ring-2 focus:ring-indigo-400 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed" /></div><div class="col-span-1"><label for="subject" class="text-gray-700 text-sm font-medium block mb-1">Subject <span class="text-red-500">*</span></label><div class="relative"><select id="subject" name="subject" required class="w-full border rounded-lg px-4 py-2.5 text-sm transition appearance-none cursor-pointer bg-white border-gray-200 text-gray-900 focus:ring-2 focus:ring-indigo-400 focus:outline-none"><option value="" disabled selected>Choose an option</option><option value="General" >General</option><option value="Bug" >Bug</option><option value="Feature" >Feature</option></select><span class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-400 text-xs">▾</span></div></div><div class="col-span-2"><label for="message" class="text-gray-700 text-sm font-medium block mb-1">Message <span class="text-red-500">*</span></label><textarea id="message" name="message" rows="5" placeholder="Your message..." required class="w-full border rounded-lg px-4 py-2.5 text-sm transition bg-white border-gray-200 text-gray-900 focus:ring-2 focus:ring-indigo-400 focus:outline-none disabled:opacity-50 disabled:cursor-not-allowed resize-y min-h-[80px]"></textarea></div><div class="col-span-2"><label class="flex items-start gap-3 cursor-pointer group"><input type="checkbox" id="subscribe" name="subscribe"  class="mt-0.5 h-4 w-4 rounded border-gray-300 accent-indigo-600 cursor-pointer" /><span class="text-gray-700 text-sm">Subscribe to newsletter</span></label></div></div><div class="mt-6"><button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-lg transition text-sm w-full sm:w-auto">Send Message</button></div></form></div></section>
<div class="h-4"></div>
<footer class="bg-gray-100 text-gray-500 text-center text-sm py-8 px-6">© 2025 SlabWebPy. Made with ❤️ for Python developers.</footer>
</body>
</html>
